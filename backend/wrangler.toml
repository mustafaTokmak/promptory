name = "promptory-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Custom domain — wired up after first deploy via the Cloudflare dashboard
# routes = [
#   { pattern = "api.promptory.chat", custom_domain = true },
# ]

# D1 database for persistent data (feedback, conversions).
# After running `wrangler d1 create promptory`, paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "promptory"
database_id = "REPLACE_WITH_DATABASE_ID_AFTER_CREATE"
migrations_dir = "migrations"

# KV namespace for rate-limit counters.
# After running `wrangler kv namespace create RATE_LIMIT`, paste the id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_ID_AFTER_CREATE"

# Secrets are NOT defined here — set them with:
#   wrangler secret put GOOGLE_ADS_DEVELOPER_TOKEN
#   wrangler secret put GOOGLE_ADS_REFRESH_TOKEN
#   wrangler secret put GOOGLE_ADS_CLIENT_ID
#   wrangler secret put GOOGLE_ADS_CLIENT_SECRET
#   wrangler secret put GOOGLE_ADS_CUSTOMER_ID
#   wrangler secret put GOOGLE_ADS_CONVERSION_ACTION_ID

[vars]
ALLOWED_ORIGIN_SITE = "https://promptory.chat"
ALLOWED_ORIGIN_EXTENSION = "chrome-extension://hbaodafglfcggljhdefilahgcpipcckg"
